spring.application.name=payment-service
server.port=8084

spring.datasource.url=jdbc:mysql://localhost:3306/railway_reservation_system
spring.datasource.username=root
spring.datasource.password=ubuntu

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=mysecretkeymysecretkeymysecretkey

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
spring.jpa.open-in-view=false

payment.price-per-seat=500.0
