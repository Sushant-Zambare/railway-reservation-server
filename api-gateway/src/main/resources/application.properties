spring.application.name=api-gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Routes
spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=train-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://TRAIN-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/trains/**

spring.cloud.gateway.server.webmvc.routes[2].id=booking-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://BOOKING-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/bookings/**

spring.cloud.gateway.server.webmvc.routes[3].id=payment-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/payments/**